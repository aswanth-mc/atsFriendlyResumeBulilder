<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}">
    <title>Document</title>
</head>
<body>

    <main id="form-section">
        <h2>Enter Your Details</h2>
        <form action="" id="resume-form">
            <fieldset class="field-group">
                <legend>Personal Information</legend>
                <input type="text" id="name-input" placeholder="Name">
                <input type="text" id="professional-title" placeholder="Professional Title">
                <br>
                <input type="email" id="email" placeholder="Email">
                <input type="text" id="phone" placeholder="Phone">
                <br>
                <input type="text" id="location" placeholder="location">
                <input type="text" id="linkedin" placeholder="LinkedIn url">
                <br>
                <input type="text" id="github" placeholder="Github url">
                <input type="text" id="website" placeholder="Personal Website url">
                <br>
                <textarea name="professional-summary" id="professional-summary" placeholder="Professional Summary"></textarea>
            </fieldset>
            <fieldset>
                <legend>Work Experience</legend>
                <input type="text" id="job-title" placeholder="Job Title">
                <input type="text" id="company-name" placeholder="Company Name">
                <div class="date-group">
                    <div class="date-field">
                        <label>Start Date</label>
                        <input type="date" id="start-date">
                    </div>
                    <div class="date-field">
                        <label>End Date</label>
                        <input type="date" id="end-date">
                    </div>
                </div>
            </fieldset>
           <fieldset class="field-group">
    <legend>Education</legend>
    
    <div class="education-grid">
        <div class="education-item">
            <label>School/University</label>
            <input type="text" id="school-input">
        </div>

        <div class="education-item">
            <label>City, Country</label>
            <input type="text" id="edu-location-input">
        </div>

        <div class="education-item">
            <label>Degree</label>
            <input type="text" id="degree-input">
        </div>

        <div class="education-item">
            <label>Graduation Year</label>
            <input type="text" id="edu-date-input">
        </div>
    </div>
</fieldset>
        </form>
    </main>
    <aside id="preview-section">
        <div class="resume-papper">
            <h1 id="preview-name">your name</h1>
            <h2 id="preview-title">professional title</h2>
            <h2 id="preview-email">email</h2>
            <h2 id="preview-phone">phone</h2>
            <h2 id="preview-location">location</h2>
            <h2 id="preview-linkedin">linkedin url</h2>
            <h2 id="preview-github">github url</h2>
            <h2 id="preview-website">personal website url</h2>
            <p id="preview-summary">professional summary</p>
            <section class="resume-section">
    <h3>Education</h3>
    <hr>
    <div class="edu-entry">
        <div class="job-header">
            <strong id="preview-school">University Name</strong>
            <span id="preview-edu-date">Graduation Date</span>
        </div>
        <div id="preview-degree">Degree / Major</div>
        <div id="preview-edu-location" style="font-size: 0.85rem; color: #666;">Location</div>
    </div>
</section>
        </div>
    </aside>
    
    <script src="{{url_for('static', filename='js/main.js')}}"></script>
</body>
</html>
